name: Sync Branches

on:
 workflow_dispatch:
    inputs:
      source:
        description: "Source branch (dev or staging)"
        required: true
        type: choice
        options:
          - dev
          - staging
      target:
        description: "Target branch (staging or master)"
        required: true
        type: choice
        options:
         - staging
         - master
jobs:
  sync:
   runs-on: ubuntu-latest

   steps:
     - name: Checkout Repo
       uses: actions/checkout@v4
       with:
         token: ${{ secrets.GITOPS_TOKEN }}
         fetch-depth: 0 

     - name: Configure Git
       run: |
         git config user.name "github-actions[bot]"
         git config user.email "github-actions[bot]@users.noreply.github.com"

     - name: Merge Source → Target
       run: |
         SRC=${{ github.event.inputs.source }}
         DEST=${{ github.event.inputs.target }}

         echo "Merging $SRC → $DEST"

          # 1. Fetch both branches explicitly
         git fetch origin $SRC $DEST

         # 2. Switch to the destination branch
         git checkout $DEST

         # 3. Attempt the merge
         if  git merge origin/$SRC  --no-edit; then
            echo "Merge successful, checking for changes..."

            # 4. Check if there are actually new commits to push
            if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/$DEST)" ]; then
               git push origin $DEST
               echo "Changes pushed to $DEST."
            else
               echo "No new changes to push (branches already in sync)."
            fi
         else  
               echo "ERROR: Merge conflict detected between $SRC and $DEST."
               echo "You must resolve conflicts manually on your local machine."
               exit 1
         fi
