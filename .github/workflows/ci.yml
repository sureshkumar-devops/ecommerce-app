name: build and push
on:
  push:
    branches:
      - dev
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
     
    - name: Set Image Tag
      run: |
        BRANCH_NAME=${GITHUB_REF##*/}
        SHORT_SHA=${GITHUB_SHA::7}
        echo "TAG=${SHORT_SHA}" >> $GITHUB_ENV
        echo $GITHUB_ENV

        # Set ENV for the HTML injection step
        if [ "$BRANCH_NAME" == "master" ]; then
           echo "DEPLOY_TARGET=prod" >> $GITHUB_ENV;
        else
           echo "DEPLOY_TARGET=$BRANCH_NAME" >> $GITHUB_ENV;
        fi

    - name: Inject Environment Variables into HTML
      run: |
         export DEPLOY_ENV=$DEPLOY_TARGET
         export GIT_BRANCH = "${{ github.ref_name }}"
         export TAG=$TAG
         # Point to the app/ directory
         envsubst < app/index.html > app/index.tmp.html && mv app/index.tmp.html app/index.html

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
         username: ${{ secrets.DOCKER_USERNAME }}
         password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image        
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ vars.DOCKER_USERNAME }}/ecommerce-app:${{ env.TAG }}




