name: Reusable Rollout Verification

on:
  workflow_call:
    inputs:
      app_name:
        description: "Kubernetes Deployment name (e.g., dev-my-app)"
        required: true
        type: string
      namespace:
        description: "Kubernetes namespace (default: argocd)"
        required: false
        default: "argocd"
        type: string
      timeout:
        description: "Timeout in seconds for rollout check"
        required: false
        default: 120
        type: number
    secrets:
      KUBECONFIG:
        description: "Base64 encoded kubeconfig for the cluster"
        required: true
        
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Add this line here
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          # This decodes the secret on the fly before passing it to the action
          kubeconfig: ${{ secrets.KUBECONFIG }} 
        env:
          # If the action fails to auto-decode, use this shell trick:
          KUBECONFIG_TEMP: ${{ secrets.KUBECONFIG }}

      # If Option 1 and the above fail, use this manual fallback:
      - name: Manual Kubeconfig Setup
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ./kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Verify Rollout Status
        run: |
          echo "🔍 Checking rollout status for ${{ inputs.app_name }} in namespace ${{ inputs.namespace }}..."
          kubectl rollout status deployment/${{ inputs.app_name }} -n ${{ inputs.namespace }} --timeout=${{ inputs.timeout }}s
          
