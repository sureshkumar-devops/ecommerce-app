name: Reusable Docker Hub Cleanup

on:
  workflow_call:
    inputs:
      repository:
        description: "The Docker Hub repository name (e.g., 'ecommerce-app')"
        required: true
        type: string
      keep_last:
        description: "Number of most recent tags to keep per pattern"
        required: false
        default: 3
        type: number
      tag_patterns:
        description: "Space-separated prefixes to clean (e.g., 'dev- stag- v1.2.0-')"
        required: false
        default: "dev- stag- v"
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Old Tags via Docker API
        run: |
          # 1. Authenticate and get JWT Token
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST \
            -d '{"username": "${{ secrets.DOCKER_USERNAME }}", "password": "${{ secrets.DOCKER_PASSWORD }}"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          REPO="${{ secrets.DOCKER_USERNAME }}/${{ inputs.repository }}"
          
          # Convert space-separated patterns into an array
          IFS=' ' read -r -a PATTERNS <<< "${{ inputs.tag_patterns }}"

          for PREFIX in "${PATTERNS[@]}"; do
            echo "---------------------------------------------------"
            echo "🔍 Processing prefix: $PREFIX"
            
            # 2. Fetch tags matching prefix, sorted newest first
            TAGS=$(curl -s -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${REPO}/tags/?page_size=100" | \
              jq -r --arg pre "$PREFIX" '.results[] | select(.name | startswith($pre)) | .name')

            # 3. Cleanup Logic
            COUNT=0
            for TAG in $TAGS; do
              COUNT=$((COUNT+1))
              if [ $COUNT -gt ${{ inputs.keep_last }} ]; then
                echo "🗑️ Deleting old tag: $TAG"
                curl -s -X DELETE -H "Authorization: JWT ${TOKEN}" \
                  "https://hub.docker.com/v2/repositories/${REPO}/tags/${TAG}/"
              else
                echo "✅ Keeping fresh tag: $TAG"
              fi
            done
          done
