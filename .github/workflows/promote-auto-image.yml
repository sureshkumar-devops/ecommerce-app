name: Promote Auto Image
on:
  workflow_dispatch:
    inputs:
      source:
        description: "Source environment (dev)"
        required: true
        default: dev
      target:
        description: "Target environment (staging or prod)"
        required: true
        type: choice
        options:
          - staging
          - prod

permissions:
  contents: write

jobs:
  promote-image:
   runs-on: ubuntu-latest

   # This line prevents the workflow from running on any branch EXCEPT dev
   if: github.ref == 'refs/heads/dev'
   
   steps: 
    - name: Checkout GitOps Repo
      uses: actions/checkout@v5
      with:
        repository: sureshkumar-devops/ecommerce-gitops
        token: ${{ secrets.GITOPS_TOKEN }}  
        ref: dev # Forces workflow to run using dev branch files
        fetch-depth: 0              
  
    - name: Promote Image
      run: |       
       if [ "${{ github.event.inputs.target }}" == "staging" ]; then
           SRC_BRANCH="dev"
           DEST_BRANCH="staging"
           SRC_ENV="dev"
           DEST_ENV="staging"
       else
           SRC_BRANCH="staging"
           DEST_BRANCH="master"                      
           SRC_ENV="staging"
           DEST_ENV="prod"
       fi
          
       echo "Source Branch: $SRC_BRANCH"
       echo "Destination Branch: $DEST_BRANCH" 
       echo "Source Environment: $SRC_ENV"
       echo "Destination Environment: $DEST_ENV"

       # SAVE TO GITHUB_ENV so the next step can see them
       echo "DEST_ENV=$DEST_ENV" >> $GITHUB_ENV
       echo "DEST_BRANCH=$DEST_BRANCH" >> $GITHUB_ENV 
       
       git fetch origin      

       # Read tag from SOURCE branch
       git checkout origin/$SRC_BRANCH
        
       IMAGE_REPO=$(grep repository environments/$SRC_ENV/values.yaml | awk '{print $2}' | tr -d '"' | tr -d '\r')       
       IMAGE_TAG=$(grep tag environments/$SRC_ENV/values.yaml | awk '{print $2}' | tr -d '"' | tr -d '\r')

       echo "Found Image Tag: $IMAGE_TAG"
       echo "Promoting $IMAGE_REPO:$IMAGE_TAG from $SRC_ENV → $DEST_ENV"

       # Switch to destination branch
       git checkout $DEST_BRANCH

       # Update destination values.yaml       
       #sed -i "s|repository:.*|repository: ${IMAGE_REPO}|" environments/${DEST_ENV}/values.yaml
       sed -i "s#repository:.*#repository: ${IMAGE_REPO}#" environments/${DEST_ENV}/values.yaml
       sed -i "s#tag:.*#tag: \"${IMAGE_TAG}\"#" environments/${DEST_ENV}/values.yaml
       #sed -i "s|tag:.*|tag: \"${IMAGE_TAG}\"|" environments/${DEST_ENV}/values.yaml

       echo "Promoting $IMAGE_REPO:$IMAGE_TAG from $SRC_ENV → $DEST_ENV"       

    - name: Configure Git and Commit and Push Changes
      run: |
        # 1. Setup Git User
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # 2. Stage only the specific environment file
        git add environments/${{ env.DEST_ENV }}/values.yaml

        # 3. Check for staged changes
        if git diff --cached --quiet; then
           echo "✨ No changes to commit for ${{ env.DEST_ENV }}"
        else
           # 4. Commit locally
           git commit -m "🚀 DevPromote image to ${{ github.event.inputs.target }}"
           
           # 5. REBASE: Pull the latest changes from the remote branch first
           # This avoids "non-fast-forward" errors if the remote has moved
           git pull --rebase origin ${{ env.DEST_BRANCH }}
           
           # 6. Push the local HEAD to the remote branch
           git push origin HEAD:${{ env.DEST_BRANCH }}
           
           echo "✅ Successfully synced ${{ env.DEST_ENV }} to ${{ env.DEST_BRANCH }}"
        fi

       #- name: Configure Git and Commit and Push Changes
#      run: |
        # 1. Setup Git User
#        git config user.name "github-actions[bot]"
#        git config user.email "github-actions[bot]@users.noreply.github.com"
