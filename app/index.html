<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suresh as a DevOps and Cloud Engineer 2026</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #00c6ff, #0072ff, #8e2de2, #4a00e0, #f12711, #f5af19);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      background: rgba(255, 255, 255, 0.9);
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 700px;
      backdrop-filter: blur(10px);
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 1.5rem;
      font-size: 1.8rem;
    }

    p {
      color: #444;
      font-size: 1.1rem;
      margin: 0.5rem 0;
    }

    .info-tag {
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      padding: 4px 10px;
      border-radius: 6px;
    }

    .button-group {
      margin-top: 2rem;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      padding: 12px 24px;
      color: white;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }

    .btn-blue { background: linear-gradient(45deg, #00c6ff, #0072ff); }
    .btn-purple { background: linear-gradient(45deg, #8e2de2, #4a00e0); }
    .btn-orange { background: linear-gradient(45deg, #f12711, #f5af19); }

    .workflow {
      margin-top: 3rem;
      text-align: center;
    }

    .workflow h2 {
      color: #2c3e50;
      margin-bottom: 1rem;
    }

    .workflow-gif {
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Welcome to Suresh DevOps Engineer and AWS Cloud Engineer - 2026!</h1>
  <h2>Suresh Rocks in  - 2026!</h2>
  <p>Environment: <span class="info-tag">${DEPLOY_ENV}</span></p>
  <p>Branch: <span class="info-tag">${GIT_BRANCH}</span></p>
  <p>Tag: <span class="info-tag">${TAG}</span></p>

  <div class="button-group">
    <button class="btn btn-blue">View Logs</button>
    <button class="btn btn-purple">Deploy Now</button>
    <button class="btn btn-orange">Settings</button>
  </div>

  <div class="workflow">
    <h2>Complete CI/CD Workflow Overview!!!../h2>
    <img src="assets/workflow.png" alt="Workflow Diagram" class="workflow-gif">
  </div>
</div>

</body>
</html>
