<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>***Suresh as a DevOps and Cloud Engineer 2026***</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 { color: #333; margin-bottom: 1.5rem; }
        p { color: #666; font-size: 1.1rem; margin: 0.5rem 0; }
        .info-tag {
            font-weight: bold;
            color: #2c3e50;
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .button-group {
            margin-top: 2rem;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            border: none;
            padding: 12px 24px;
            color: white;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        /* Gradient Styles */
        .btn-blue { background: linear-gradient(45deg, #00c6ff, #0072ff); }
        .btn-purple { background: linear-gradient(45deg, #8e2de2, #4a00e0); }
        .btn-orange { background: linear-gradient(45deg, #f12711, #f5af19); }
    </style>
</head>
<body>

<div class="container">
     <h1>!!Welcome to Suresh DevOps Engineer and AWS Cloud Engineer!</h1>
    <!-- These placeholders will be replaced by the CI/CD pipeline -->
    <p>Environment:-- <span class="info-tag">${DEPLOY_ENV}</span></p>
    <p>Branch:-- <span class="info-tag">${GIT_BRANCH}</span></p>
    <p>TAG:--- <span class="info-tag">${TAG}</span></p>

    <div class="button-group">
        <button class="btn btn-blue">View Logs</button>
        <button class="btn btn-purple">Deploy Now</button>
        <button class="btn btn-orange">Settings</button>
    </div>
</div>

</body>
</html>
